name: Selenium Python Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10" # You can change this to match your Python version

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip

          # Install Selenium and optional test framework like pytest
          pip install selenium pytest webdriver-manager

          # Install from requirements.txt if it exists
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Selenium Tests
        run: |
          # IMPORTANT: Make sure your Selenium script runs in headless mode!
          # example: options.add_argument("--headless")

          # Run tests using pytest or python directly (update the command to match your script)
          pytest
          # Or: python my_selenium_test.py
